# =============================================================================
# CI — Continuous Integration
# Runs on every push and every pull request targeting main.
# Blocks merge if any quality pillar fails.
#
# Pillars (mirror validate_system.bat):
#   1. Static Code Quality      — ruff check + ruff format + pyright
#   2. Logic & Coverage         — pytest ≥ 70% coverage
#   3. Security & Container     — docker build + trivy scan
#
# DVC pipeline synchronisation and service health are environment-dependent
# and run in the CD workflow against the deployed environment, not in CI
# where no services are running.
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality-gate:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff Lint
        run: uv run ruff check
      - name: Ruff Format
        run: uv run ruff format --check
      - name: Pyright Typecheck
        run: uv run pyright

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run Pytest
        run: uv run pytest --cov=src --cov-fail-under=70

  docker-build:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t ai-assistant:latest .
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ai-assistant:latest"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
