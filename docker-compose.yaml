# =============================================================================
# AI Assistant with Persistent Memory — Docker Compose
# Orchestrates the multi-layer agentic stack on an isolated network.
#
# Services:
#   backend   :8000  FastAPI Agent Service + LangGraph Orchestration
#   frontend  :8501  Streamlit Glassmorphism UI
#   llm       :8080  Docker Model Runner (Local Inference)
#   jaeger    :16686 Distributed Tracing UI (OTLP Collector)
#
# Usage:
#   docker compose up --build          # build + start all services
#   docker compose up -d               # start in detached mode
#   docker compose logs -f             # stream all logs
#   docker compose down                # stop and remove containers
#   docker compose down -v             # also remove named volumes (ChromaDB/SQLite)
# =============================================================================

services:
  backend:
    build: .
    volumes:
      - ./:/app
      - /app/.venv # Anonymous volume to prevent host overwrite
    ports:
      - 8000:8000
    env_file: .env
    environment:
      - OTEL_EXPORTER_TYPE=otlp
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4318
    command: [ "uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000" ]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      llm:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build: .
    volumes:
      - ./:/app
      - /app/.venv # Anonymous volume to prevent host overwrite
    ports:
      - 8501:8501
    environment:
      - BACKEND_URL=http://backend:8000
      - PYTHONPATH=/app
    command:
      [
        "streamlit",
        "run",
        "src/ui/app.py",
        "--server.port=8501",
        "--server.address=0.0.0.0",
      ]
    depends_on:
      - backend

  llm:
    provider:
      type: model
      options:
        model: ai/devstral-small-2
    healthcheck:
      # Add a healthcheck for the llm service itself
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 10s # Increased timeout
      retries: 10
      start_period: 60s # The LLM needs time to load

  # Jaeger All-in-One — Distributed Tracing UI
  # Access the Jaeger UI at http://localhost:16686 after starting the stack.
  # The backend service exports OTLP spans to this container on port 4318.
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "4318:4318" # OTLP HTTP receiver
    environment:
      - COLLECTOR_OTLP_ENABLED=true
