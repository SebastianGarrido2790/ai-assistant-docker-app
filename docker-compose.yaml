services:
  backend:
    build: .
    volumes:
      - ./:/app
      - /app/.venv # Anonymous volume to prevent host overwrite
    ports:
      - 8000:8000
    env_file: .env
    command: ["uvicorn", "src.api.app:app", "--host", "0.0.0.0", "--port", "8000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      llm:
        condition: service_healthy

  frontend:
    build: .
    volumes:
      - ./:/app
      - /app/.venv # Anonymous volume to prevent host overwrite
    ports:
      - 8501:8501
    environment:
      - BACKEND_URL=http://backend:8000
    command: ["streamlit", "run", "gui.py", "--server.port=8501", "--server.address=0.0.0.0"]
    depends_on:
      - backend
  llm:
    provider:
      type: model
      options:
        model: ai/devstral-small-2
    healthcheck:
      # Add a healthcheck for the llm service itself
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 10s
      timeout: 10s # Increased timeout
      retries: 10
      start_period: 60s # The LLM needs time to load
