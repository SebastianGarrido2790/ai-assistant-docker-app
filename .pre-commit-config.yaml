# =============================================================================
# Pre-commit Hook Configuration
# Enforces ruff, pyright, bandit, and general file hygiene locally before any
# commit reaches CI. Mirrors Pillar 1 of validate_system.bat exactly.
#
# Adheres to the "Python-Development" Standard:
#   - Strong Typing (Pyright)
#   - Clean Code (Ruff)
#   - Security First (Bandit)
#
# Installation:
#   uv run pre-commit install
#
# Manual execution:
#   uv run pre-commit run --all-files
# =============================================================================

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.361
    hooks:
      - id: pyright

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: ["-r", "src/", "-ll"]
